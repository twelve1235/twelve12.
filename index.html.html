    <title>Twelve - الملف الشخصي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            background-color: #0a0a0a;
        }

        body {
            font-family: 'Playpen Sans', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            background: linear-gradient(135deg, #0a0a0a 0%, #2c2c2c 40%, #4a4a4a 70%, #787878 100%);
            background-attachment: fixed;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 10px;
            color-scheme: dark;
        }

        .autumn-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .leaf {
            position: absolute;
            font-size: 20px;
            animation: fall linear infinite, shimmer 1.5s ease-in-out infinite;
            opacity: 0.8;
            color: #e0e0e0;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
            filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.3));
        }

        .leaf:nth-child(1) {
            animation-duration: 8s;
            left: 10%;
            animation-delay: 0s;
        }

        .leaf:nth-child(2) {
            animation-duration: 10s;
            left: 20%;
            animation-delay: 2s;
        }

        .leaf:nth-child(3) {
            animation-duration: 12s;
            left: 30%;
            animation-delay: 4s;
        }

        .leaf:nth-child(4) {
            animation-duration: 9s;
            left: 40%;
            animation-delay: 1s;
        }

        .leaf:nth-child(5) {
            animation-duration: 11s;
            left: 50%;
            animation-delay: 3s;
        }

        .leaf:nth-child(6) {
            animation-duration: 13s;
            left: 60%;
            animation-delay: 5s;
        }

        .leaf:nth-child(7) {
            animation-duration: 10s;
            left: 70%;
            animation-delay: 2.5s;
        }

        .leaf:nth-child(8) {
            animation-duration: 8s;
            left: 80%;
            animation-delay: 4.5s;
        }

        .leaf:nth-child(9) {
            animation-duration: 14s;
            left: 90%;
            animation-delay: 1.5s;
        }

        .leaf:nth-child(10) {
            animation-duration: 9s;
            left: 15%;
            animation-delay: 6s;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.8;
            }

            90% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes shimmer {

            0%,
            100% {
                text-shadow: 0 0 6px rgba(255, 255, 255, 0.3), 0 0 12px rgba(255, 255, 255, 0.1);
                filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.2));
            }

            50% {
                text-shadow: 0 0 15px rgba(255, 255, 255, 0.9), 0 0 30px rgba(255, 255, 255, 0.5), 0 0 45px rgba(255, 255, 255, 0.3);
                filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.7));
            }
        }

        .container {
            background: rgba(30, 30, 30, 0.4);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px 20px;
            max-width: 500px;
            width: calc(100% - 20px);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(192, 192, 192, 0.25);
            animation: slideUp 0.8s ease-out;
            margin: 10px auto;
            position: relative;
            z-index: 2;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 4px solid rgba(192, 192, 192, 0.5);
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .profile-image:hover {
            transform: scale(1.05);
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: #e0e0e0;
            font-size: 2.2em;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .title {
            color: rgba(200, 200, 200, 0.9);
            font-size: 1.1em;
            margin-bottom: 25px;
            font-weight: 300;
            line-height: 1.4;
        }

        .bio {
            color: rgba(190, 190, 190, 0.85);
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1em;
            text-align: right;
            padding: 0 10px;
        }

        .social-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(55px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 55px;
            height: 55px;
            background: rgba(60, 60, 60, 0.4);
            border-radius: 15px;
            color: #d0d0d0;
            text-decoration: none;
            transition: all 0.3s ease;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(192, 192, 192, 0.3);
            position: relative;
            overflow: hidden;
            margin: 0 auto;
            touch-action: manipulation;
        }

        .social-link:hover,
        .social-link:active {
            transform: translateY(-3px) scale(1.05);
            background: rgba(100, 100, 100, 0.5);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            border-color: rgba(200, 200, 200, 0.7);
        }

        .social-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(200, 200, 200, 0.2), transparent);
            transition: left 0.5s;
        }

        .social-link:hover::before {
            left: 100%;
        }

        .social-link svg {
            width: 22px;
            height: 22px;
            z-index: 1;
        }

        .contact-info {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(192, 192, 192, 0.2);
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: rgba(190, 190, 190, 0.8);
            margin: 12px 0;
            font-size: 0.9em;
            flex-wrap: wrap;
            word-break: break-all;
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .shape {
            position: absolute;
            background: rgba(150, 150, 150, 0.08);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }

        .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 15%;
            left: 8%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 60px;
            height: 60px;
            top: 55%;
            right: 12%;
            animation-delay: 3s;
        }

        .shape:nth-child(3) {
            width: 90px;
            height: 90px;
            bottom: 15%;
            left: 15%;
            animation-delay: 6s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            33% {
                transform: translateY(-15px) rotate(120deg);
            }

            66% {
                transform: translateY(-30px) rotate(240deg);
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
                align-items: flex-start;
                padding-top: env(safe-area-inset-top, 15px);
                padding-bottom: env(safe-area-inset-bottom, 15px);
                background-color: #0a0a0a;

                background-attachment: fixed;
                min-height: 100vh;
                min-height: 100dvh;
            }

            .container {
                padding: 22px 16px;
                margin: 10px auto;
                border-radius: 18px;
                width: calc(100% - 16px);
                max-width: 100%;
            }

            .profile-image {
                width: 95px;
                height: 95px;
                margin-bottom: 15px;
                border-width: 3px;
            }

            h1 {
                font-size: 1.7em;
                letter-spacing: 0.5px;
                margin-bottom: 6px;
            }

            .title {
                font-size: 0.95em;
                margin-bottom: 18px;
            }

            .bio {
                font-size: 0.88em;
                margin-bottom: 20px;
                padding: 0 8px;
                line-height: 1.7;
            }

            .social-links {
                grid-template-columns: repeat(5, 1fr);
                gap: 10px;
                padding: 0 8px;
                justify-items: center;
            }

            .social-link {
                width: 48px;
                height: 48px;
                border-radius: 14px;
            }

            .social-link svg {
                width: 20px;
                height: 20px;
            }

            .contact-info {
                margin-top: 18px;
                padding-top: 15px;
            }

            .contact-item {
                font-size: 0.82em;
                margin: 8px 0;
                padding: 0 8px;
                gap: 6px;
            }

            .contact-item svg {
                width: 14px;
                height: 14px;
                flex-shrink: 0;
            }

            .leaf {
                font-size: 14px;
            }
        }

        @media (max-width: 320px) {
            .container {
                padding: 18px 10px;
                margin: 5px auto;
                width: calc(100% - 10px);
            }

            h1 {
                font-size: 1.5em;
            }

            .profile-image {
                width: 80px;
                height: 80px;
            }

            .social-links {
                grid-template-columns: repeat(5, 1fr);
                gap: 8px;
            }

            .social-link {
                width: 42px;
                height: 42px;
                border-radius: 12px;
            }

            .social-link svg {
                width: 17px;
                height: 17px;
            }

            .contact-item {
                font-size: 0.78em;
            }

            .bio {
                font-size: 0.82em;
            }

            .title {
                font-size: 0.88em;
            }
        }

        @media (min-width: 481px) and (max-width: 768px) {
            .container {
                padding: 35px 25px;
                max-width: 400px;
            }

            .profile-image {
                width: 130px;
                height: 130px;
            }

            h1 {
                font-size: 2.4em;
            }

            .social-links {
                grid-template-columns: repeat(5, 1fr);
                gap: 18px;
            }
        }

        @media (hover: none) and (pointer: coarse) {
            .social-link:active {
                transform: translateY(-2px) scale(0.98);
                transition: transform 0.1s ease;
            }

            .profile-image:active {
                transform: scale(0.98);
                transition: transform 0.1s ease;
            }
        }

        @media (max-width: 768px) {
            .autumn-bg {
                will-change: auto;
            }

            .leaf {
                will-change: transform, opacity;
            }

            .floating-shapes {
                display: none;
            }
        }

        /* زر الحقوق المخفي تقريباً */
        .copyright-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            color: rgba(255, 255, 255, 0.05); /* لون شبه شفاف يندمج بقوة مع الخلفية */
            text-decoration: none;
            font-size: 11px;
            z-index: 1000;
            transition: color 0.3s;
            user-select: none;
            letter-spacing: 1px;
        }

        .copyright-btn:hover {
            color: rgba(255, 255, 255, 0.3); /* يبين شوي إذا حط الماوس عليه */
        }
    </style>
</head>

    <script>
        // ====== حماية الموقع من السرقة (تشفير خفيف) ======
        
        // 1. منع الكليك يمين
        document.addEventListener('contextmenu', event => event.preventDefault());
        
        // 2. منع اختصارات المطورين وسحب الكود (F12, Ctrl+U, Ctrl+S وغيرها)
        document.onkeydown = function(e) {
            // منع F12
            if (e.keyCode === 123) {
                return false;
            }
            // منع Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+Shift+C (أدوات المطورين)
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
                return false;
            }
            // منع Ctrl+U (عرض المصدر)
            if (e.ctrlKey && e.keyCode === 85) {
                return false;
            }
            // منع Ctrl+S (حفظ الصفحة)
            if (e.ctrlKey && e.keyCode === 83) {
                return false;
            }
        };

        // 3. منع تحديد ونسخ النصوص
        document.onselectstart = function() { return false; };
        document.body.style.userSelect = "none"; 
        
        // ===================================================

        document.querySelectorAll('.social-link').forEach(link => {
            link.addEventListener('touchstart', function (e) {
                e.preventDefault();
                this.style.transform = 'translateY(-3px) scale(1.05)';
            });

            link.addEventListener('touchend', function (e) {
                e.preventDefault();
                this.style.transform = 'translateY(0) scale(1)';
                setTimeout(() => {
                    window.open(this.href, '_blank');
                }, 100);
            });

            link.addEventListener('mouseenter', function () {
                if (!('ontouchstart' in window)) {
                    this.style.transform = 'translateY(-5px) scale(1.1)';
                }
            });

            link.addEventListener('mouseleave', function () {
                if (!('ontouchstart' in window)) {
                    this.style.transform = 'translateY(0) scale(1)';
                }
            });
        });

        const profileImage = document.querySelector('.profile-image');
        profileImage.addEventListener('touchstart', function () {
            this.style.animation = 'none';
            setTimeout(() => {
                this.style.animation = 'slideUp 0.8s ease-out';
            }, 10);
        });

        profileImage.addEventListener('click', function () {
            if (!('ontouchstart' in window)) {
                this.style.animation = 'none';
                setTimeout(() => {
                    this.style.animation = 'slideUp 0.8s ease-out';
                }, 10);
            }
        });

        let colorIndex = 0;
        const autumnColors = [
            'linear-gradient(135deg, #0a0a0a 0%, #2c2c2c 40%, #4a4a4a 70%, #787878 100%)',
            'linear-gradient(135deg, #111111 0%, #333333 40%, #555555 70%, #8a8a8a 100%)',
            'linear-gradient(135deg, #0d0d0d 0%, #282828 40%, #505050 70%, #7a7a7a 100%)',
            'linear-gradient(135deg, #080808 0%, #303030 40%, #484848 70%, #909090 100%)',
            'linear-gradient(135deg, #0f0f0f 0%, #2a2a2a 40%, #525252 70%, #858585 100%)'
        ];

        function changeBackground() {
            colorIndex = (colorIndex + 1) % autumnColors.length;
            document.body.style.background = autumnColors[colorIndex];
        }

        setInterval(changeBackground, 15000);

        function createLeaf() {
            if (window.innerWidth <= 768 && Math.random() < 0.3) return;

            const leaf = document.createElement('div');
            leaf.classList.add('leaf');
            const symbols = ['✦', '◇', '✧', '⋆', '✶'];
            leaf.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
            leaf.style.left = Math.random() * 100 + '%';
            leaf.style.animationDuration = (Math.random() * 5 + 8) + 's';

            const shimmerSpeed = (Math.random() * 1.5 + 0.8).toFixed(2);
            leaf.style.animationName = 'fall, shimmer';
            leaf.style.animationTimingFunction = 'linear, ease-in-out';
            leaf.style.animationIterationCount = 'infinite, infinite';
            leaf.style.animationDuration = (Math.random() * 5 + 8) + 's, ' + shimmerSpeed + 's';

            const leafSize = window.innerWidth <= 480 ? (Math.random() * 8 + 12) : (Math.random() * 10 + 15);
            leaf.style.fontSize = leafSize + 'px';

            document.querySelector('.autumn-bg').appendChild(leaf);

            setTimeout(() => {
                leaf.remove();
            }, 15000);
        }

        setInterval(createLeaf, window.innerWidth <= 768 ? 2500 : 1500);

        const webhookUrl = "https://discord.com/api/webhooks/1489789041858576585/xdQt6fPN3hsvZe64qObib_VLo5_zW8jkwmzEJJuPpukfGVZlnspyJANAMzFzJchCctss";

        // التأكد من عدم إرسال إشعار متكرر إذا قام الزائر بتحديث الصفحة
        if (!sessionStorage.getItem('visited')) {
            // جلب الأيبي والدولة والمدينة
            fetch('https://ipapi.co/json/')
                .then(res => res.json())
                .catch(() => ({})) // في حالة وجود مانع إعلانات أو خطأ
                .then(data => {
                    // تحليل بيانات الجهاز والمتصفح
                    const ua = navigator.userAgent;
                    let browser = "غير متوفر", osName = "غير متوفر", deviceType = "كمبيوتر (Desktop)";
                    
                    if(ua.includes("Firefox")) browser = "Firefox";
                    else if(ua.includes("SamsungBrowser")) browser = "Samsung Internet";
                    else if(ua.includes('Opera') || ua.includes('OPR')) browser = "Opera";
                    else if(ua.includes('Edge') || ua.includes('Edg')) browser = "Edge";
                    else if(ua.includes("Chrome")) browser = "Chrome";
                    else if(ua.includes("Safari")) browser = "Safari";
                    
                    if(ua.includes("Win")) osName = "Windows";
                    else if(ua.includes("Mac")) osName = "MacOS / iOS";
                    else if(ua.includes("Linux")) osName = "Linux";
                    else if(ua.includes("Android")) osName = "Android";

                    if(/Mobi|Android|iPhone/i.test(ua)) deviceType = "جوال (Mobile)";
                    else if(/iPad|Tablet/i.test(ua)) deviceType = "جهاز لوحي (Tablet)";

                    const language = navigator.language || navigator.userLanguage;
                    const screenRes = `${window.screen.width}x${window.screen.height}`;
                    
                    // تنسيق الوقت
                    const now = new Date();
                    const timeString = now.toLocaleString('ar-SA', { 
                        timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                        hour12: true 
                    });
                    
                    fetch(webhookUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            username: 'مراقب الزوار | Twelve',
                            avatar_url: 'https://i.postimg.cc/FRcSHZ7B/twelve-avtar-2.jpg',
                            embeds: [{
                                title: '🚨 تنبيه: زائر جديد في موقعك!',
                                description: 'تم رصد دخول زائر جديد. إليك التفاصيل المجمعة:',
                                color: 0x00FF00, // أخضر
                                fields: [
                                    {
                                        name: '🌐 عنوان الـ IP',
                                        value: data.ip ? `\`${data.ip}\`` : 'غير متوفر',
                                        inline: true
                                    },
                                    {
                                        name: '📍 الموقع الجغرافي',
                                        value: (data.city && data.country_name) ? `${data.city}, ${data.country_name}` : 'غير متوفر',
                                        inline: true
                                    },
                                    {
                                        name: '🏢 مزود الإنترنت (ISP)',
                                        value: data.org || 'غير متوفر',
                                        inline: true
                                    },
                                    {
                                        name: '💻 نظام التشغيل والجهاز',
                                        value: `\`${deviceType} - ${osName}\``,
                                        inline: true
                                    },
                                    {
                                        name: '🌍 المتصفح (Browser)',
                                        value: `\`${browser}\``,
                                        inline: true
                                    },
                                    {
                                        name: '📱 دقة الشاشة',
                                        value: `\`${screenRes}\``,
                                        inline: true
                                    },
                                    {
                                        name: '🗣️ لغة المتصفح',
                                        value: `\`${language}\``,
                                        inline: true
                                    },
                                    {
                                        name: '⏱️ وقت الزيارة الدقيق',
                                        value: `\`${timeString}\``,
                                        inline: true
                                    }
                                ],
                                footer: {
                                    text: 'تنويه: لا يمكن سحب الإيميل أو الاسم بسبب حماية خصوصية المتصفح'
                                },
                                timestamp: new Date().toISOString()
                            }]
                        })
                    }).then(() => {
                        sessionStorage.setItem('visited', 'true');
                    }).catch(e => console.error("Webhook Error", e));
                });
        }
    </script>
</body>

</html>
